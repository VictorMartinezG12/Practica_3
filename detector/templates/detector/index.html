<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detección de Objetos en Tiempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #111; color: #eee; }
        #video-feed { border: 3px solid #28a745; border-radius: 8px; max-width: 100%; }
        .card { background-color: #1c1c1c; border: 1px solid #333; }
        .list-group-item { background-color: #1c1c1c; color: #eee; border-color: #333; }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4 text-center">📷 Detección de Objetos en Tiempo Real (OpenCV + YOLOv8)</h1>
    <div class="row">
        <div class="col-md-8 text-center">
            <img id="video-feed" src="{% url 'video_feed' %}" alt="Video en vivo">
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Últimas detecciones</div>
                <ul id="detections-list" class="list-group list-group-flush">
                    <li class="list-group-item">Esperando detecciones...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
async function actualizarDetecciones() {
    try {
        const res = await fetch("{% url 'latest_detections' %}");
        const data = await res.json();
        const lista = document.getElementById('detections-list');
        lista.innerHTML = '';
        if (data.detections.length === 0) {
            lista.innerHTML = '<li class="list-group-item">Sin detecciones aún</li>';
            return;
        }
        data.detections.forEach(d => {
            const li = document.createElement('li');
            li.className = 'list-group-item';
            li.textContent = `[${d.timestamp}] ${d.objeto} - ${d.confianza}`;
            lista.appendChild(li);
        });
    } catch (e) {
        console.error('Error al obtener detecciones', e);
    }
}
setInterval(actualizarDetecciones, 2000);
actualizarDetecciones();
</script>
</body>
</html>
